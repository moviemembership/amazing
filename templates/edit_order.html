{% extends "base.html" %}

{% block title %}
    {{ "Add Order" if is_new else "Edit Order" }}
{% endblock %}

{% block content %}
<main class="narrow-shell">
    <section class="panel">
        <span class="eyebrow">Orders</span>
        <h1>
            {{ "Add New Order" if is_new else "Edit Order #" ~ order.id }}
        </h1>

        <a
            class="text-link"
            href="{{ url_for('admin', key=admin_key) }}"
        >
            ← Back to Admin
        </a>

        <form method="POST" class="form-stack form-space">
            <label>
                Telegram ID
                <input
                    name="telegram_id"
                    value="{{ order.telegram_id or '' }}"
                    required
                >
            </label>

            <label>
                Username
                <input
                    name="username"
                    value="{{ order.username or '' }}"
                >
            </label>

            <label>
                Raw Item
                <textarea
                    id="raw_item"
                    name="raw_item"
                    required
                >{{ order.raw_item or '' }}</textarea>
            </label>

            <label>
                Preview Auto Generated
                <pre id="preview" class="preview-box">{{ preview }}</pre>
            </label>

            <label>
                Order Time
                <input
                    type="datetime-local"
                    name="created_at"
                    value="{{ order.created_at or '' }}"
                    required
                >
            </label>

            <button class="button" type="submit">
                {{ "Add Order" if is_new else "Save Changes" }}
            </button>
        </form>
    </section>
</main>
{% endblock %}

{% block scripts %}
<script>
function makePreview(text) {
    const parts = text.split("----");

    if (parts.length === 3) {
        return (
            "Email: " + parts[0] +
            "\nPassword: " + parts[1] +
            "\nProfile: " + parts[2]
        );
    }

    if (parts.length === 2) {
        return (
            "Email: " + parts[0] +
            "\nPassword: " + parts[1]
        );
    }

    return text;
}

document
    .getElementById("raw_item")
    .addEventListener("input", function () {
        document.getElementById("preview").textContent =
            makePreview(this.value);
    });
</script>
{% endblock %}
